<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сохранённые игры</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Сохранённые игры пользователя {{ user }}</h1>
        
        {% if saves %}
            <ul>
            {% for save in saves %}
                <li>
                    <a href="{{ url_for('load_save', filename=save) }}">{{ save }}</a>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>У вас нет сохранённых игр.</p>
        {% endif %}
        
        <p><a href="{{ url_for('game_menu') }}">Вернуться в меню</a></p>
    </div>
</body>
</html>
